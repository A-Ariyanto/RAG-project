# Golden evaluation set — UNSW Handbook RAG (Phase 5).
#
# ~30 hand-verifiable Q&A pairs that produce the project's headline numbers:
# retrieval hit-rate, answer groundedness, and refusal accuracy. LLM-drafted,
# then every pair hand-checked against the live handbook pages (source_url of the
# gold chunk) — this file is only trustworthy once each `answer` below has been
# confirmed against source, so treat verification as part of the deliverable.
#
# Gold chunks are keyed by the STABLE (doc_code, section_type) pair, not the
# BIGSERIAL `chunks.id` — ids churn on every re-ingest (per-doc delete+insert),
# so an id-based gold set would rot. (doc_code, section_type) is what the Phase 3
# probe harness already matches on, and it's what a human can eyeball on the page.
#
# Fields per item:
#   id            — stable slug, used in eval output
#   question      — the user question, as a student would phrase it
#   shape         — prerequisite | offering | uoc | exclusion | equivalent
#                   | corequisite | unanswerable  (which capability it exercises)
#   phrasing      — answerable only. code: the question names the course by its
#                   code (favours lexical/FTS). name: by course name/paraphrase
#                   only, no code (favours semantic/vector). The retrieval report
#                   splits hit-rate on this — it's the evidence that hybrid is
#                   robust to phrasing where each single method is not.
#   answerable    — true: a grounded answer exists; false: correct behavior is refusal
#   gold          — list of (doc_code, section_type) chunks that contain the answer
#                   (empty for unanswerable)
#   answer        — short reference answer, for human verification and as context
#                   for the LLM-as-judge; for unanswerable, why it's out of scope
#   refusal_layer — unanswerable only. Which layer should catch it:
#                     retrieval  — off-corpus, top RRF score should fall below the
#                                  refusal threshold (this is what the sweep tunes)
#                     generation — names a real course but the attribute isn't in
#                                  the corpus; retrieval finds the course, so only
#                                  the citation-enforcing prompt can decline it
#
# Facts below were confirmed against the ingested chunks on 2026-07-13; re-confirm
# against the handbook if the corpus is re-scraped.

