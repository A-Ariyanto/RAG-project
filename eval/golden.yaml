# =============================================================================
# Unanswerable — correct behavior is refusal
# =============================================================================
# Off-corpus: no course anchors, top RRF score should sit below the refusal
# threshold. These are what the threshold sweep tunes against.
- id: unans-capital-france
  question: "What is the capital of France?"
  shape: unanswerable
  answerable: false
  gold: []
  refusal_layer: retrieval
  answer: "Out of scope — general knowledge, nothing to do with the UNSW Handbook corpus."

